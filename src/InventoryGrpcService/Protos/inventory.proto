syntax = "proto3";

option csharp_namespace = "InventoryGrpcService";

package inventory;

service Inventory {
  rpc CheckStock (CheckStockRequest) returns (CheckStockReply);
  rpc ReserveStock (ReserveStockRequest) returns (ReserveStockReply);
}

message CheckStockRequest {
  string product_id = 1;
  int32 quantity = 2;
}

message CheckStockReply {
  bool is_available = 1;
  int32 available_quantity = 2;
  string message = 3;
}

message ReserveStockRequest {
  string product_id = 1;
  int32 quantity = 2;
}

message ReserveStockReply {
  bool is_reserved = 1;
  int32 remaining_quantity = 2;
  string message = 3;
}
