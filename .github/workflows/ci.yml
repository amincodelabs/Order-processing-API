name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore OrderProcessingApi.sln

      - name: Build solution
        run: dotnet build OrderProcessingApi.sln --no-restore

      - name: Run tests
        run: dotnet test OrderProcessingApi.sln --no-build
